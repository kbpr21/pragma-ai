name: Deploy Documentation

# Manual + on-demand. Build always runs; deploy only if you've enabled
# GitHub Pages (Settings -> Pages -> Source: GitHub Actions).
# This avoids first-push failures on a fresh repo.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install mkdocs-material
        run: pip install mkdocs-material
      - name: Build site
        run: mkdocs build --strict --site-dir site
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only run when explicitly requested. Once Pages is enabled in repo
    # Settings -> Pages -> Source = GitHub Actions, switch this to
    # `if: github.event_name == 'push'` (or remove the gate entirely).
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
