name: Publish to PyPI

# Triggered when you push a tag like v1.0.0 or v1.0.1.
# Uses PyPI Trusted Publisher (OIDC) — NO API token in repo secrets.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   - PyPI project name:  pragma-ai
#   - Owner:              <your GitHub user/org>
#   - Repository:         pragma
#   - Workflow:           publish.yml
#   - Environment:        pypi
#
# Then in this repo: Settings -> Environments -> create "pypi"
# (optionally with required reviewers for an extra approval step).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish'
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Build distribution
        run: python -m build

      - name: Verify metadata
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pragma-ai
    permissions:
      id-token: write   # required for Trusted Publisher / OIDC
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — Trusted Publisher uses OIDC.

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## pragma-ai ${{ github.ref_name }}

            Install:
            ```bash
            pip install pragma-ai
            ```

            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
